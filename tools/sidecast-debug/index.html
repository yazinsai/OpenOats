<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sidecast Debug</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --bg: #1a1a1a; --surface: #242424; --border: #333;
        --text: #e0e0e0; --text-muted: #888; --accent: #6366f1;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg); color: var(--text); font-size: 13px;
      }
      #app {
        display: grid;
        grid-template-columns: 300px 1fr 350px;
        height: 100vh;
      }
      .panel { border-right: 1px solid var(--border); overflow-y: auto; padding: 12px; }
      .panel:last-child { border-right: none; }
      h2 { font-size: 14px; margin-bottom: 8px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
      h3 { font-size: 12px; margin: 12px 0 6px; color: var(--text-muted); }
      label { display: block; margin-bottom: 6px; font-size: 12px; }
      input, select, textarea {
        width: 100%; padding: 6px 8px; background: var(--surface); border: 1px solid var(--border);
        border-radius: 4px; color: var(--text); font-size: 12px; font-family: inherit;
      }
      textarea { resize: vertical; min-height: 80px; }
      button {
        padding: 6px 12px; background: var(--accent); color: white; border: none;
        border-radius: 4px; cursor: pointer; font-size: 12px;
      }
      button:hover { opacity: 0.9; }
      button.secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
      .toggle { display: flex; align-items: center; gap: 8px; }
      .url-bar { display: flex; gap: 8px; margin-bottom: 12px; }
      .url-bar input { flex: 1; }
      #transcript-viewer {
        max-height: 300px; overflow-y: auto; margin-top: 8px;
        background: var(--surface); border-radius: 4px; padding: 8px;
      }
      .transcript-seg { padding: 3px 6px; border-radius: 3px; cursor: pointer; line-height: 1.5; }
      .transcript-seg:hover { background: rgba(99,102,241,0.15); }
      .transcript-seg.active { background: rgba(99,102,241,0.25); font-weight: 500; }
      .transcript-seg .ts { color: var(--text-muted); font-size: 11px; margin-right: 6px; font-variant-numeric: tabular-nums; }
      .bubble {
        background: var(--surface); border-radius: 8px; padding: 10px 12px;
        margin-bottom: 8px; border-left: 3px solid var(--accent);
      }
      .bubble-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
      .bubble-name { font-weight: 600; font-size: 12px; }
      .bubble-meta { font-size: 10px; color: var(--text-muted); }
      .bubble-text { font-size: 13px; line-height: 1.4; }
      .debug-info { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-family: monospace; }
      .persona-card {
        background: var(--surface); border-radius: 6px; padding: 8px 10px; margin-bottom: 6px;
        display: flex; align-items: center; gap: 8px;
      }
      .persona-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
      .persona-info { flex: 1; min-width: 0; }
      .persona-name { font-weight: 500; font-size: 12px; }
      .persona-subtitle { font-size: 11px; color: var(--text-muted); }
      .status-bar {
        display: flex; align-items: center; gap: 8px; padding: 8px 12px;
        background: var(--surface); border-bottom: 1px solid var(--border);
        grid-column: 1 / -1;
      }
      .status-dot { width: 8px; height: 8px; border-radius: 50%; }
      .status-dot.ok { background: #22c55e; }
      .status-dot.error { background: #ef4444; }
      .status-dot.loading { background: #f59e0b; }
      .slider-row { display: flex; align-items: center; gap: 8px; }
      .slider-row input[type="range"] { flex: 1; }
      .slider-row .slider-val { min-width: 40px; text-align: right; font-variant-numeric: tabular-nums; }
      .section { margin-bottom: 16px; }
      .section-header {
        cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        padding: 6px 0; border-bottom: 1px solid var(--border); margin-bottom: 8px;
      }
      .section-header::after { content: "\25BE"; font-size: 10px; }
      .section.collapsed .section-body { display: none; }
      .section.collapsed .section-header::after { content: "\25B8"; }
      #raw-json { display: none; background: var(--surface); padding: 8px; border-radius: 4px; white-space: pre-wrap; font-family: monospace; font-size: 11px; max-height: 300px; overflow-y: auto; margin-top: 8px; }
      .filter-log { font-size: 11px; color: var(--text-muted); padding: 4px 8px; border-left: 2px solid #555; margin-bottom: 4px; }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="status-bar">
        <div id="status-dot" class="status-dot"></div>
        <span id="status-text">Paste a YouTube URL to start</span>
      </div>
      <div id="settings-panel" class="panel"></div>
      <div id="player-panel" class="panel">
        <div class="url-bar">
          <input id="yt-url" type="text" placeholder="Paste YouTube URL..." />
          <button id="yt-load">Load</button>
        </div>
        <div id="yt-player-container"></div>
        <div id="transcript-viewer"></div>
      </div>
      <div id="sidecast-panel" class="panel">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <h2>Sidecast Output</h2>
          <div style="display:flex;gap:4px;">
            <button id="generate-btn" class="secondary">Generate Now</button>
            <button id="clear-btn" class="secondary">Clear</button>
          </div>
        </div>
        <div id="sidecast-bubbles"></div>
        <button id="toggle-raw" class="secondary" style="margin-top:8px;font-size:11px;">Toggle Raw JSON</button>
        <pre id="raw-json"></pre>
        <div id="filter-log" style="margin-top:8px;"></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
