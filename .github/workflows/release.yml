name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Existing tag to build and publish (for example: v1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: powershell
        working-directory: opencassava

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: opencassava/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            opencassava/src-tauri -> target

      - name: Install frontend dependencies
        run: npm.cmd ci

      - name: Build Windows installers
        run: npm.cmd run tauri -- build --bundles nsis,msi

      - name: Upload Windows bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: opencassava-windows-bundles
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: opencassava

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref_name }}
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: opencassava/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            opencassava/src-tauri -> target

      - name: Install macOS build dependencies
        run: brew install cmake
        working-directory: .

      - name: Prepare whisper-rs
        run: pwsh opencassava/scripts/prepare-whisper.ps1
        working-directory: .

      - name: Install frontend dependencies
        run: npm ci

      - name: Build macOS DMG
        run: npm run tauri -- build --bundles dmg
        env:
          # Apple Clang 17 on M-series sets __ARM_FEATURE_MATMUL_INT8 based on
          # native CPU capabilities even when -mcpu=...+noi8mm disables i8mm at
          # the code-generation level. This causes always_inline vmmlaq_s32 calls
          # in ggml-cpu-quants.c to fail because the surrounding function is
          # compiled without i8mm support. Force-undefine the macro so ggml
          # falls back to its non-i8mm code path.
          CFLAGS: "-U__ARM_FEATURE_MATMUL_INT8"
          CXXFLAGS: "-U__ARM_FEATURE_MATMUL_INT8"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencassava-mac-dmg
          path: target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  build-ubuntu:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: opencassava

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.release_tag || github.ref_name }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: opencassava/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            opencassava/src-tauri -> target

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            pkg-config \
            libdbus-1-dev \
            libasound2-dev \
            cmake \
            clang \
            libclang-dev
        working-directory: .

      - name: Prepare whisper-rs
        run: pwsh opencassava/scripts/prepare-whisper.ps1
        working-directory: .

      - name: Install frontend dependencies
        run: npm ci

      - name: Build .deb package
        run: npm run tauri -- build --bundles deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencassava-ubuntu-deb
          path: target/release/bundle/deb/*.deb
          if-no-files-found: error

  publish-release:
    needs: [build-windows, build-mac, build-ubuntu]
    runs-on: ubuntu-latest

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          files: artifacts/**/*
