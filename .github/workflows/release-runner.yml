name: Release Runner

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["package-smoke", "ui-smoke", "validate-swift"]
    types: [completed]
    branches: [main]

permissions:
  contents: write
  issues: read
  pull-requests: write

concurrency:
  group: release-runner
  cancel-in-progress: true

jobs:
  release:
    if: >-
      github.event_name == 'push'
      || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: "${{ github.event.workflow_run.head_sha || github.sha }}"
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version bump and release
        env:
          GH_TOKEN: "${{ secrets.AUTO_MAINTAINER_PAT }}"
        run: |
          set -euo pipefail

          read_yaml_array() {
            local key="$1"
            ruby -e 'require "yaml"; cfg = File.exist?(ARGV[0]) ? (YAML.load_file(ARGV[0]) || {}) : {}; Array(cfg[ARGV[1]]).each { |v| puts v }' .github/repo-policy.yml "$key" 2>/dev/null || true
          }

          check_required_contexts() {
            local sha="$1"
            shift || true
            local required=("$@")
            if [ "${#required[@]}" -eq 0 ]; then
              return 0
            fi

            local checks_json statuses_json
            checks_json=$(gh api "repos/${{ github.repository }}/commits/${sha}/check-runs" 2>/dev/null || echo '{"check_runs":[]}')
            statuses_json=$(gh api "repos/${{ github.repository }}/commits/${sha}/status" 2>/dev/null || echo '{"statuses":[]}')

            local missing=0
            for name in "${required[@]}"; do
              [ -n "$name" ] || continue

              local latest_check latest_status check_ok status_ok
              latest_check=$(echo "$checks_json" | jq -r --arg name "$name" '
                ([.check_runs[]? | select(.name == $name)]
                | sort_by([.started_at // .completed_at // "", (.id // 0)])
                | last
                | .conclusion) // empty
              ')
              latest_status=$(echo "$statuses_json" | jq -r --arg name "$name" '
                ([.statuses[]? | select(.context == $name)]
                | sort_by([.updated_at // .created_at // "", (.id // 0)])
                | last
                | .state) // empty
              ')

              check_ok=false
              status_ok=false
              if [ "$latest_check" = "success" ] || [ "$latest_check" = "neutral" ] || [ "$latest_check" = "skipped" ]; then
                check_ok=true
              fi
              if [ "$latest_status" = "success" ]; then
                status_ok=true
              fi

              if [ "$check_ok" != "true" ] && [ "$status_ok" != "true" ]; then
                echo "Required check not green for ${sha}: ${name}"
                missing=1
              fi
            done

            return "$missing"
          }

          HEAD_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"

          mapfile -t REQUIRED_RELEASE_CHECKS < <(read_yaml_array required_release_checks)
          if ! check_required_contexts "$HEAD_SHA" "${REQUIRED_RELEASE_CHECKS[@]}"; then
            if [ "${#REQUIRED_RELEASE_CHECKS[@]}" -gt 0 ]; then
              echo "Required release checks are not green on ${HEAD_SHA}; skipping release"
            fi
            exit 0
          fi

          LATEST_TAG=$(git tag --merged "$HEAD_SHA" --list 'v*' --sort=-v:refname | head -1)
          if [ -n "$LATEST_TAG" ]; then
            echo "Latest reachable tag: ${LATEST_TAG}"
            RANGE="${LATEST_TAG}..${HEAD_SHA}"
          else
            echo "No prior release tag found"
            LATEST_TAG="v0.0.0"
            RANGE="$HEAD_SHA"
          fi

          PR_NUMBERS=$(for COMMIT_SHA in $(git rev-list --reverse "$RANGE" 2>/dev/null || true); do
            gh api "repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls" --jq '.[].number' 2>/dev/null || true
          done | awk 'NF && !seen[$0]++')

          if [ -z "$PR_NUMBERS" ]; then
            echo "No merged PRs associated with commits in ${RANGE}"
            exit 0
          fi

          HAS_PATCH=false
          HAS_MINOR=false
          HAS_MAJOR=false
          HAS_HIGH_RISK=false
          RELEASE_NOTES=""

          for pr_number in $PR_NUMBERS; do
            PR_DATA=$(gh pr view "$pr_number" --json title,labels,author,mergedAt 2>/dev/null || echo "")
            [ -n "$PR_DATA" ] || continue

            MERGED_AT=$(echo "$PR_DATA" | jq -r '.mergedAt // empty')
            if [ -z "$MERGED_AT" ]; then
              continue
            fi

            PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')
            PR_AUTHOR=$(echo "$PR_DATA" | jq -r '.author.login // "ghost"')
            LABELS=$(echo "$PR_DATA" | jq -r '[.labels[].name] | join("|")')

            RELEASE_NOTES+="- ${PR_TITLE} (#${pr_number}) by @${PR_AUTHOR}"$'\n'

            if [[ "|$LABELS|" == *"|release:major|"* ]]; then
              HAS_MAJOR=true
            fi
            if [[ "|$LABELS|" == *"|risk:high|"* ]]; then
              HAS_HIGH_RISK=true
            fi
            if [[ "|$LABELS|" == *"|release:minor|"* ]]; then
              HAS_MINOR=true
            fi
            if [[ "|$LABELS|" == *"|release:patch|"* ]]; then
              HAS_PATCH=true
            fi
          done

          if $HAS_MAJOR || $HAS_HIGH_RISK; then
            echo "Release blocked: batch contains release:major or risk:high"
            exit 0
          fi

          if ! $HAS_PATCH && ! $HAS_MINOR; then
            echo "No patch or minor releases in merged PR batch"
            exit 0
          fi

          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          if $HAS_MINOR; then
            MINOR=$((MINOR + 1))
            PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Creating release ${NEW_TAG}"

          NOTES=$(printf '## What'"'"'s Changed\n\n%s\n**Full Changelog**: %s...%s' "$RELEASE_NOTES" "$LATEST_TAG" "$NEW_TAG")

          gh release create "$NEW_TAG" \
            --target "$HEAD_SHA" \
            --title "$NEW_TAG" \
            --notes "$NOTES"
