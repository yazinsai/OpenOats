name: Gate Runner

on:
  pull_request_target:
    types: [labeled]
  check_run:
    types: [completed]
  status: {}
  pull_request_review:
    types: [submitted, dismissed]

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: read

concurrency:
  group: "gate-${{ github.event.pull_request.number || 'check' }}"

jobs:
  gate-check:
    if: >-
      github.event_name != 'pull_request_target'
      || github.event.label.name == 'state:ready-to-merge'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Determine PRs to check
        id: prs
        env:
          GH_TOKEN: "${{ secrets.AUTO_MAINTAINER_PAT }}"
        run: |
          if [ "${{ github.event_name }}" = "pull_request_target" ]; then
            echo "numbers=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            NUMBERS=$(gh pr list --label "state:ready-to-merge" --state open --json number --jq '.[].number' | tr '\n' ' ')
            echo "numbers=$NUMBERS" >> "$GITHUB_OUTPUT"
          fi

      - name: Run gate checks
        env:
          GH_TOKEN: "${{ secrets.AUTO_MAINTAINER_PAT }}"
        run: |
          set -euo pipefail

          read_yaml_array() {
            local key="$1"
            ruby -e 'require "yaml"; cfg = File.exist?(ARGV[0]) ? (YAML.load_file(ARGV[0]) || {}) : {}; Array(cfg[ARGV[1]]).each { |v| puts v }' .github/repo-policy.yml "$key" 2>/dev/null || true
          }

          check_required_contexts() {
            local sha="$1"
            shift || true
            local required=("$@")
            if [ "${#required[@]}" -eq 0 ]; then
              return 0
            fi

            local checks_json statuses_json
            checks_json=$(gh api "repos/${{ github.repository }}/commits/${sha}/check-runs" 2>/dev/null || echo '{"check_runs":[]}')
            statuses_json=$(gh api "repos/${{ github.repository }}/commits/${sha}/status" 2>/dev/null || echo '{"statuses":[]}')

            local missing=0
            for name in "${required[@]}"; do
              [ -n "$name" ] || continue

              local latest_check latest_status check_ok status_ok
              latest_check=$(echo "$checks_json" | jq -r --arg name "$name" '
                ([.check_runs[]? | select(.name == $name)]
                | sort_by([.started_at // .completed_at // "", (.id // 0)])
                | last
                | .conclusion) // empty
              ')
              latest_status=$(echo "$statuses_json" | jq -r --arg name "$name" '
                ([.statuses[]? | select(.context == $name)]
                | sort_by([.updated_at // .created_at // "", (.id // 0)])
                | last
                | .state) // empty
              ')

              check_ok=false
              status_ok=false
              if [ "$latest_check" = "success" ] || [ "$latest_check" = "neutral" ] || [ "$latest_check" = "skipped" ]; then
                check_ok=true
              fi
              if [ "$latest_status" = "success" ]; then
                status_ok=true
              fi

              if [ "$check_ok" != "true" ] && [ "$status_ok" != "true" ]; then
                echo "Required check not green for ${sha}: ${name}"
                missing=1
              fi
            done

            return "$missing"
          }

          mapfile -t REQUIRED_PR_CHECKS < <(read_yaml_array required_pr_checks)

          for PR_NUMBER in ${{ steps.prs.outputs.numbers }}; do
            echo "::group::Checking PR #${PR_NUMBER}"

            PR_DATA=$(gh pr view "$PR_NUMBER" --json labels,mergeable,reviews,body,headRefName,baseRefName,headRefOid)
            LABELS=$(echo "$PR_DATA" | jq -r '[.labels[].name] | join(" ")')

            if ! echo "$LABELS" | grep -q "state:ready-to-merge"; then
              echo "PR #${PR_NUMBER}: missing state:ready-to-merge label, skipping"
              echo "::endgroup::"
              continue
            fi

            if echo "$LABELS" | grep -q "risk:high"; then
              echo "PR #${PR_NUMBER}: has risk:high label — gate failed"
              gh pr comment "$PR_NUMBER" --body "Gate check failed: PR has \`risk:high\` label and requires human review."
              gh pr edit "$PR_NUMBER" --remove-label "state:ready-to-merge" --add-label "state:in-progress"
              echo "::endgroup::"
              continue
            fi

            if ! echo "$LABELS" | grep -q "resolution:none"; then
              echo "PR #${PR_NUMBER}: missing resolution:none label — gate failed"
              gh pr comment "$PR_NUMBER" --body "Gate check failed: PR is missing the \`resolution:none\` label."
              gh pr edit "$PR_NUMBER" --remove-label "state:ready-to-merge" --add-label "state:in-progress"
              echo "::endgroup::"
              continue
            fi

            BODY=$(echo "$PR_DATA" | jq -r '.body // ""')
            if [ -z "$BODY" ]; then
              echo "PR #${PR_NUMBER}: empty body — gate failed"
              gh pr comment "$PR_NUMBER" --body "Gate check failed: PR description is empty."
              gh pr edit "$PR_NUMBER" --remove-label "state:ready-to-merge" --add-label "state:in-progress"
              echo "::endgroup::"
              continue
            fi

            MERGEABLE=$(echo "$PR_DATA" | jq -r '.mergeable')
            if [ "$MERGEABLE" = "UNKNOWN" ]; then
              echo "PR #${PR_NUMBER}: mergeable status unknown (CI pending), will retry later"
              echo "::endgroup::"
              continue
            fi
            if [ "$MERGEABLE" != "MERGEABLE" ]; then
              echo "PR #${PR_NUMBER}: not mergeable ($MERGEABLE) — gate failed"
              gh pr comment "$PR_NUMBER" --body "Gate check failed: PR is not mergeable (status: ${MERGEABLE})."
              gh pr edit "$PR_NUMBER" --remove-label "state:ready-to-merge" --add-label "state:in-progress"
              echo "::endgroup::"
              continue
            fi

            CHANGES_REQUESTED=$(echo "$PR_DATA" | jq '[.reviews[] | select(.state == "CHANGES_REQUESTED")] | length')
            if [ "$CHANGES_REQUESTED" -gt 0 ]; then
              echo "PR #${PR_NUMBER}: has changes-requested reviews — gate failed"
              gh pr comment "$PR_NUMBER" --body "Gate check failed: PR has outstanding change requests."
              gh pr edit "$PR_NUMBER" --remove-label "state:ready-to-merge" --add-label "state:in-progress"
              echo "::endgroup::"
              continue
            fi

            PR_SHA=$(echo "$PR_DATA" | jq -r '.headRefOid')
            if ! check_required_contexts "$PR_SHA" "${REQUIRED_PR_CHECKS[@]}"; then
              if [ "${#REQUIRED_PR_CHECKS[@]}" -gt 0 ]; then
                FORMATTED=$(printf '`%s`, ' "${REQUIRED_PR_CHECKS[@]}")
                FORMATTED=${FORMATTED%, }
                gh pr comment "$PR_NUMBER" --body "Gate check pending: required check(s) not green on the PR head SHA: ${FORMATTED}."
              fi
              echo "PR #${PR_NUMBER}: required PR checks not green yet"
              echo "::endgroup::"
              continue
            fi

            MERGE_METHOD=$(ruby -e 'require "yaml"; cfg = File.exist?(ARGV[0]) ? (YAML.load_file(ARGV[0]) || {}) : {}; puts(cfg["merge_strategy"] || "squash")' .github/repo-policy.yml 2>/dev/null || echo "squash")

            echo "PR #${PR_NUMBER}: all gates passed, merging with ${MERGE_METHOD}"
            gh pr merge "$PR_NUMBER" --"${MERGE_METHOD}" --delete-branch

            gh pr edit "$PR_NUMBER" --add-label "resolution:merged,state:done" --remove-label "state:ready-to-merge"

            LINKED_ISSUES=$(gh pr view "$PR_NUMBER" --json closingIssuesReferences --jq '.closingIssuesReferences[].number' 2>/dev/null || true)
            for ISSUE in $LINKED_ISSUES; do
              gh issue close "$ISSUE" --comment "Closed by PR #${PR_NUMBER}."
            done

            echo "::endgroup::"
          done
