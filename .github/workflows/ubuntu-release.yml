name: Build Ubuntu App

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ubuntu:
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: opencassava

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: opencassava/package-lock.json

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            opencassava/src-tauri -> target

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            pkg-config \
            libdbus-1-dev \
            libasound2-dev \
            cmake \
            clang \
            libclang-dev
        working-directory: .

      - name: Prepare whisper-rs
        run: pwsh opencassava/scripts/prepare-whisper.ps1
        working-directory: .

      - name: Install frontend dependencies
        run: npm ci

      - name: Build .deb package
        run: npm run tauri -- build --bundles deb

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencassava-ubuntu-deb
          path: target/release/bundle/deb/*.deb
          if-no-files-found: error

